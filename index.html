<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Smart Sight Words</title>
<style>
body { 
font-family: 'Comic Sans MS', sans-serif; 
margin: 0; padding: 0;
width: 100vw; height: 100vh;
overflow: hidden;
background-color: #f0f4f8;
display: flex; flex-direction: column; align-items: center; justify-content: center;
}

/* Background Video Styling */
#bg-video {
position: fixed;
top: 50%;
left: 50%;
min-width: 100%;
min-height: 100%;
width: auto;
height: auto;
z-index: -100;
transform: translateX(-50%) translateY(-50%);
background-size: cover;
filter: opacity(0.7); /* Makes the video a bit lighter so words are easy to read */
}

#loader {
position: fixed; top: 0; left: 0; width: 100%; height: 100%;
background: #ffffff; z-index: 3000;
display: none; flex-direction: column; align-items: center; justify-content: center;
}

.ball {
width: 50px; height: 50px;
background-color: #007bff;
border-radius: 50%;
animation: bounce 0.5s cubic-bezier(.5,0,.5,1) infinite alternate;
}
@keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-100px); } }

#setup-screen {
position: absolute; width: 100%; height: 100%;
background: rgba(255, 255, 255, 0.9); z-index: 2000;
display: flex; flex-direction: column; align-items: center; justify-content: center;
padding: 20px; text-align: center;
}

.instruction-box {
background: #e7f3ff;
border: 2px solid #b2d7ff;
padding: 15px;
border-radius: 10px;
margin-bottom: 20px;
max-width: 600px;
font-size: 16px;
color: #333;
text-align: left;
}

input[type="text"], textarea { width: 70%; padding: 15px; font-size: 18px; border-radius: 10px; border: 2px solid #bbb; margin-bottom: 15px; }

.start-btn { 
margin-top: 20px; padding: 30px 80px; font-size: 32px; 
background: #007bff; color: white; border: none; 
border-radius: 25px; cursor: pointer; font-weight: bold;
box-shadow: 0 8px 15px rgba(0,0,0,0.1);
touch-action: manipulation;
}
.start-btn:active { background: #0056b3; transform: translateY(2px); }

.export-btn { margin-top: 15px; padding: 15px 30px; font-size: 18px; background: #28a745; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; }

#student-view { display:none; width: 100%; justify-content: center; align-items: center; }

.word-card { 
font-size: 80px; font-weight: bold; border: 12px solid #333; 
padding: 50px 20px; margin: 0 15px; border-radius: 40px; 
min-width: 260px; text-align: center; background: white; 
box-shadow: 0 15px 30px rgba(0,0,0,0.2);
cursor: pointer; user-select: none;
pointer-events: none;
transition: transform 0.2s, background-color 0.3s;
}

.card-active { pointer-events: auto; animation: jiggle 0.4s ease-out; }
@keyframes jiggle { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

.card-correct { border-color: #28a745 !important; background-color: #d4edda !important; transform: scale(1.05) !important; }
.card-incorrect { border-color: #dc3545 !important; background-color: #f8d7da !important; opacity: 0.6; }

.card-flash {
animation: flashGreen 1.2s ease-in-out 3;
border-color: #28a745 !important; 
background-color: #d4edda !important;
}

@keyframes flashGreen {
0%, 100% { border-color: #333; background-color: white; transform: scale(1); }
50% { border-color: #28a745; background-color: #d4edda; transform: scale(1.05); }
}

#final-report { 
display: none; padding: 40px; background: white; border: 10px solid #333; border-radius: 30px; 
width: 80%; max-height: 80vh; overflow-y: auto; font-size: 28px;
}
</style>
</head>
<body>

<video autoplay muted loop id="bg-video">
  <source src="https://raw.githubusercontent.com/cspring585/sight-words/main/Alphablocks_3_Top.mp4" type="video/mp4">
  Your browser does not support HTML5 video.
</video>

<div id="loader">
<div class="ball"></div>
<h2 id="loader-text" style="margin-top: 40px; color: #333;">Creating Lesson...</h2>
</div>

<div id="setup-screen">
<h1>Smart Sight Words</h1>
<div class="instruction-box">
<strong>Directions:</strong>
<ol style="margin-top: 5px;">
<li>Enter the <b>Student's Name</b>.</li>
<li>Enter words separated by commas.</li>
<li>Click <b>Start Lesson</b>.</li>
</ol>
<label style="font-size: 20px; cursor: pointer;">
<input type="checkbox" id="enable-sfx" checked style="transform: scale(1.5); margin-right: 10px;"> 
Enable Feedback Sounds
</label>
</div>
<input type="text" id="student-name" placeholder="Enter Student Name">
<textarea id="word-input">horse, car, yellow, see, ball, and, fish</textarea>
<button class="start-btn" id="main-start-btn">START LESSON</button>
</div>

<div id="student-view">
<div class="word-card" id="card-0" onclick="handleTouch(0)"></div>
<div class="word-card" id="card-1" onclick="handleTouch(1)"></div>
<div class="word-card" id="card-2" onclick="handleTouch(2)"></div>
</div>

<div id="final-report">
<h2 id="report-title" style="text-align: center;">Results</h2>
<div id="report-content" style="line-height: 1.6; font-family: monospace;"></div>
<button class="export-btn" onclick="exportCSV()">Download Results (.csv)</button>
<button class="start-btn" onclick="location.reload()" style="background: #333; width: 100%;">Restart</button>
</div>

<script>
let sightWords = [], remaining = [], currentTarget = "", displayedWords = [], isProcessing = false, sessionLog = [];
let studentName = "", sfxEnabled = true;
const synth = window.speechSynthesis;
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let bestVoice = null;

function pickVoice() {
const voices = synth.getVoices();
bestVoice = voices.find(v => v.name === 'Google US English') || 
voices.find(v => v.name.includes('Siri') || v.name.includes('Samantha')) ||
voices.find(v => v.lang.startsWith('en-US')) || voices[0];
}

if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = pickVoice;

function playTone(freq, type, duration) {
if (!sfxEnabled) return;
const osc = audioCtx.createOscillator();
const gain = audioCtx.createGain();
osc.type = type;
osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
osc.connect(gain); gain.connect(audioCtx.destination);
osc.start(); osc.stop(audioCtx.currentTime + duration);
}

document.getElementById('main-start-btn').addEventListener('click', function() {
document.activeElement.blur();
pickVoice();
// Try to play the video if it got blocked by the browser
const bgVid = document.getElementById('bg-video');
if (bgVid) bgVid.play().catch(e => console.log("Auto-play blocked, waiting for interaction"));

studentName = document.getElementById('student-name').value || "Student";
sfxEnabled = document.getElementById('enable-sfx').checked;
const input = document.getElementById('word-input').value;
sightWords = input.split(/[ ,]+/).filter(w => w.trim() !== "");
remaining = [...sightWords].sort(() => 0.5 - Math.random());

if(sightWords.length < 1) {
alert("Please enter some words first!");
return;
}

document.getElementById('setup-screen').style.display = "none";
document.getElementById('loader').style.display = "flex";

setTimeout(() => {
document.getElementById('loader').style.display = "none";
document.getElementById('student-view').style.display = "flex";
nextTurn();
}, 4000);
});

function speak(text, isTarget, onEndCallback) {
synth.cancel(); 
const utterance = new SpeechSynthesisUtterance(text);
if (bestVoice) utterance.voice = bestVoice;
utterance.rate = isTarget ? 0.78 : 0.82; 
if (onEndCallback) utterance.onend = onEndCallback;
synth.speak(utterance);
}

function nextTurn() {
if (remaining.length === 0) return finishSession();
currentTarget = remaining[0];
let decoys = sightWords.filter(w => w !== currentTarget).sort(() => 0.5 - Math.random()).slice(0, 2);
displayedWords = [currentTarget, ...decoys].sort(() => 0.5 - Math.random());

for(let i=0; i<3; i++) {
const card = document.getElementById(`card-${i}`);
card.innerText = displayedWords[i];
card.className = "word-card";
card.style.visibility = "visible";
}

setTimeout(() => { 
speak(`Show me ${currentTarget}`, true, () => {
for(let i=0; i<3; i++) document.getElementById(`card-${i}`).classList.add('card-active');
}); 
}, 800);
}

function handleTouch(index) {
if (isProcessing || !currentTarget) return;
isProcessing = true;
for(let i=0; i<3; i++) document.getElementById(`card-${i}`).classList.remove('card-active');

const chosenWord = displayedWords[index];
const isCorrect = (chosenWord === currentTarget);
sessionLog.push({ word: currentTarget, result: isCorrect ? "+" : "-", timestamp: new Date().toLocaleTimeString() });

for(let i=0; i<3; i++) {
const card = document.getElementById(`card-${i}`);
if (isCorrect) {
if (displayedWords[i] === currentTarget) card.classList.add('card-correct');
} else {
if (displayedWords[i] === currentTarget) card.classList.add('card-flash');
else if (i === index) card.classList.add('card-incorrect');
}
}

if (isCorrect) {
playTone(660, 'sine', 0.2); 
setTimeout(() => speak("Correct!", false), 500);
} else {
playTone(220, 'triangle', 0.3); 
setTimeout(() => {
speak(`That was ${chosenWord}. The word is ${currentTarget}.`, true);
}, 500);
}

remaining.shift(); 
let delay = isCorrect ? 2500 : 5000; 

setTimeout(() => {
for(let i=0; i<3; i++) {
const card = document.getElementById(`card-${i}`);
card.style.visibility = "hidden";
card.className = "word-card";
}
isProcessing = false;
nextTurn();
}, delay); 
}

function finishSession() {
document.getElementById('student-view').style.display = "none";
document.getElementById('final-report').style.display = "block";
document.getElementById('report-title').innerText = `${studentName}'s Results`;
document.getElementById('report-content').innerHTML = sessionLog.map(item => 
`<strong>${item.word.toUpperCase()}</strong> : ${item.result}`
).join('<br>');
speak(`All finished, ${studentName}!`, false);
}

function exportCSV() {
let csvContent = "data:text/csv;charset=utf-8,Student,Word,Result,Time\n";
sessionLog.forEach(row => { csvContent += `${studentName},${row.word},${row.result},${row.timestamp}\n`; });
const encodedUri = encodeURI(csvContent);
const link = document.createElement("a");
link.setAttribute("href", encodedUri);
link.setAttribute("download", `${studentName.replace(/\s+/g, '_')}_Results.csv`);
document.body.appendChild(link); link.click(); document.body.removeChild(link);
}
</script>
</body>
</html>
